<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokka Vijay | AI Engineer Portfolio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        #canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        nav { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); padding: 15px 40px; border-radius: 50px; border: 1px solid rgba(0,255,170,0.3); }
        nav a { color: #fff; text-decoration: none; margin: 0 20px; font-weight: 600; opacity: 0.8; transition: 0.3s; }
        nav a:hover { opacity: 1; color: #00ffaa; }
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        .hero h1 { font-size: 6rem; font-weight: 900; background: linear-gradient(45deg, #00ffaa, #00d4ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; animation: glow 2s ease-in-out infinite alternate; }
        @keyframes glow { from { filter: drop-shadow(0 0 20px rgba(0,255,170,0.5)); } to { filter: drop-shadow(0 0 40px rgba(0,255,170,0.8)); } }
        .subtitle { font-size: 1.5rem; letter-spacing: 3px; opacity: 0.9; }
        section { min-height: 100vh; padding: 100px 20px; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 40px; margin: 20px 0; transition: 0.4s; }
        .glass:hover { border-color: #00ffaa; transform: translateY(-10px); box-shadow: 0 20px 60px rgba(0,255,170,0.2); }
        .project-card { cursor: pointer; position: relative; overflow: hidden; }
        .project-card::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(0,255,170,0.1), transparent); transition: 0.6s; }
        .project-card:hover::before { left: 100%; }
        .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .feature { background: rgba(0,255,170,0.05); border: 1px solid rgba(0,255,170,0.2); padding: 20px; border-radius: 15px; }
        .btn { background: #00ffaa; color: #000; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 20px; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(0,255,170,0.5); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #00ffaa; border-radius: 10px; }
        @media (max-width: 768px) { .hero h1 { font-size: 3rem; } nav { padding: 10px 20px; } nav a { margin: 0 10px; font-size: 0.9rem; } }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <nav id="nav"></nav>
    
    <div class="hero">
        <div>
            <h1 id="profileName">Loading...</h1>
            <div class="subtitle" id="profileSubtitle">Loading...</div>
        </div>
    </div>

    <div class="container">
        <section id="about"></section>
        <section id="projects"></section>
        <section id="contact"></section>
    </div>

    <script>
        let data, scene, camera, renderer, particles;
        
        async function loadData() {
            const response = await fetch('./data.json');
            data = await response.json();
            renderPortfolio();
        }

        function renderPortfolio() {
            document.getElementById('profileName').textContent = data.profile.name.toUpperCase();
            document.getElementById('profileSubtitle').textContent = data.profile.subtitle;

            document.getElementById('nav').innerHTML = `
                <a href="#home">Home</a>
                <a href="#about">About</a>
                <a href="#projects">Projects</a>
                <a href="#contact">Contact</a>
            `;

            document.getElementById('about').innerHTML = `
                <div class="glass">
                    <h2 style="color: #00ffaa; font-size: 3rem; margin-bottom: 20px;"><i class="fas fa-user-astronaut"></i> About Me</h2>
                    <p style="font-size: 1.2rem; line-height: 1.8; opacity: 0.9;">${data.profile.bio}</p>
                    <div style="margin-top: 40px;">
                        <h3 style="color: #00ffaa; margin-bottom: 20px;">Skills</h3>
                        ${Object.keys(data.skills).map(category => `
                            <div style="margin: 20px 0;">
                                <h4 style="opacity: 0.8;">${category}</h4>
                                <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px;">
                                    ${data.skills[category].map(skill => `
                                        <span style="background: rgba(0,255,170,0.1); border: 1px solid #00ffaa; padding: 8px 20px; border-radius: 25px;">${skill}</span>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            document.getElementById('projects').innerHTML = `
                <h2 style="color: #00ffaa; font-size: 3rem; margin-bottom: 40px; text-align: center;">Featured Projects</h2>
                ${data.projects.map(project => `
                    <div class="glass project-card" style="border-left: 4px solid ${project.color};">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <div>
                                <h3 style="font-size: 2rem; color: ${project.color};">${project.name}</h3>
                                <p style="font-size: 1.1rem; opacity: 0.8;">${project.tagline}</p>
                            </div>
                            <span style="background: ${project.color}; color: #000; padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: bold;">${project.status}</span>
                        </div>
                        <p style="margin: 20px 0; font-size: 1.1rem; line-height: 1.6;">${project.description}</p>
                        <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px;">
                            ${project.tech.map(tech => `<span style="background: rgba(255,255,255,0.1); padding: 6px 15px; border-radius: 15px; font-size: 0.9rem;">${tech}</span>`).join('')}
                        </div>
                        ${project.features ? `
                            <div class="features-grid">
                                ${project.features.map(f => `
                                    <div class="feature">
                                        <i class="fas fa-${f.icon}" style="color: #00ffaa; font-size: 1.5rem; margin-bottom: 10px;"></i>
                                        <h4>${f.title}</h4>
                                        <p style="font-size: 0.9rem; opacity: 0.8; margin-top: 10px;">${f.desc}</p>
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                `).join('')}
            `;

            document.getElementById('contact').innerHTML = `
                <div class="glass" style="text-align: center;">
                    <h2 style="color: #00ffaa; font-size: 3rem; margin-bottom: 20px;">Let's Collaborate</h2>
                    <p style="font-size: 1.2rem; opacity: 0.9; margin-bottom: 30px;">${data.profile.location}</p>
                    <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
                        <a href="mailto:${data.profile.email}" class="btn"><i class="fas fa-envelope"></i> Email</a>
                        <a href="${data.profile.github}" class="btn" target="_blank"><i class="fab fa-github"></i> GitHub</a>
                        <a href="${data.profile.linkedin}" class="btn" target="_blank"><i class="fab fa-linkedin"></i> LinkedIn</a>
                    </div>
                    <p style="margin-top: 50px; opacity: 0.5;">© 2026 ${data.profile.name} | Built with Three.js & JSON</p>
                </div>
            `;
        }

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 50;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            for (let i = 0; i < 10000; i++) {
                vertices.push(THREE.MathUtils.randFloatSpread(500));
                vertices.push(THREE.MathUtils.randFloatSpread(500));
                vertices.push(THREE.MathUtils.randFloatSpread(500));
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            
            const material = new THREE.PointsMaterial({ color: 0x00ffaa, size: 0.7, transparent: true, opacity: 0.8 });
            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            particles.rotation.y += 0.0003;
            particles.rotation.x += 0.0001;
            renderer.render(scene, camera);
        }

        window.addEventListener('scroll', () => {
            const scrollPercent = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight);
            gsap.to(camera.position, { z: 50 + scrollPercent * 30, duration: 1 });
            gsap.to(particles.rotation, { y: scrollPercent * Math.PI * 2, duration: 2 });
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        loadData();
        init3D();
    </script>
</body>
</html>
